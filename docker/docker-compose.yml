services:

  # ============================
  # Servidor FL (Agregação FedAvg)
  # ============================
  fl-server:
    image: fl-app-image:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fl_server
    environment:
      - MODE=server
    volumes:
      - ../src:/app
    networks:
      - fl-network

  # ============================
  # Cliente Estável (envia pesos completos)
  # ============================
  client-full:
    image: fl-app-image:latest
    depends_on:
      - fl-server
    volumes:
      - ../src:/app
    environment:
      - MODE=client
      - SERVER_URL=http://fl-server:5000
      - HOSTNAME=client-full
    networks:
      - fl-network

  # ============================
  # Cliente Instável (compressão Top-K + caos de rede)
  # ============================
  client-noisy:
    image: fl-app-image:latest
    container_name: cliente_instavel
    depends_on:
      - fl-server
    volumes:
      - ../src:/app
    environment:
      - MODE=client
      - SERVER_URL=http://fl-server:5000
      - HOSTNAME=client-noisy
    networks:
      - fl-network

  # ============================
  # Dashboard Streamlit (Visualização)
  # ============================
  dashboard:
    image: fl-app-image:latest
    command: streamlit run dashboard.py --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - ../src:/app
    environment:
      - SERVER_URL=http://fl-server:5000
    networks:
      - fl-network

  # ============================
  # Injetor de Caos (tc netem no cliente instável)
  # ============================
  chaos-injector:
    image: alpine:latest
    container_name: chaos_injector
    volumes:
      - ../src:/app
    command: sh /app/chaos_loop.sh
    cap_add:
      - NET_ADMIN
    network_mode: service:client-noisy
    depends_on:
      - client-noisy

networks:
  fl-network:
    driver: bridge
