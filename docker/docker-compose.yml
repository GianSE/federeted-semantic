services:

  # ============================
  # Servidor FL (Agregação FedAvg)
  # ============================
  fl-server:
    image: fl-app-image:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fl_server
    environment:
      - MODE=server
      - DATASET=${DATASET:-mnist}
      - TRAINING_PROFILE=${TRAINING_PROFILE:-standard}
    volumes:
      - ../src:/app
    networks:
      - fl-network

  # ============================
  # Cliente Estável (envia pesos completos)
  # ============================
  client-full:
    image: fl-app-image:latest
    depends_on:
      - fl-server
    volumes:
      - ../src:/app
    environment:
      - MODE=client
      - SERVER_URL=http://fl-server:5000
      - HOSTNAME=client-full
      - DATASET=${DATASET:-mnist}
      - TRAINING_PROFILE=${TRAINING_PROFILE:-standard}
    networks:
      - fl-network

  # ============================
  # Cliente Instável (compressão Top-K + caos de rede)
  # ============================
  client-noisy:
    image: fl-app-image:latest
    container_name: cliente_instavel
    depends_on:
      - fl-server
    volumes:
      - ../src:/app
    environment:
      - MODE=client
      - SERVER_URL=http://fl-server:5000
      - HOSTNAME=client-noisy
      - DATASET=${DATASET:-mnist}
      - TRAINING_PROFILE=${TRAINING_PROFILE:-standard}
    networks:
      - fl-network

  # ============================
  # Cliente Non-IID (dados heterogêneos - apenas dígitos 0-3)
  # ============================
  client-noniid:
    image: fl-app-image:latest
    container_name: cliente_noniid
    depends_on:
      - fl-server
    volumes:
      - ../src:/app
    environment:
      - MODE=client
      - SERVER_URL=http://fl-server:5000
      - HOSTNAME=client-noniid
      - DATASET=${DATASET:-mnist}
      - TRAINING_PROFILE=${TRAINING_PROFILE:-standard}
    networks:
      - fl-network

  # ============================
  # Dashboard Streamlit (Visualização)
  # ============================
  dashboard:
    image: fl-app-image:latest
    command: streamlit run dashboard.py --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - ../src:/app
    environment:
      - SERVER_URL=http://fl-server:5000
      - DATASET=${DATASET:-mnist}
      - TRAINING_PROFILE=${TRAINING_PROFILE:-standard}
    networks:
      - fl-network

  # ============================
  # Injetor de Caos (tc netem no cliente instável)
  # ============================
  chaos-injector:
    image: alpine:latest
    container_name: chaos_injector
    volumes:
      - ../src:/app
    command: sh /app/chaos_loop.sh
    cap_add:
      - NET_ADMIN
    network_mode: service:client-noisy
    depends_on:
      - client-noisy

  # ============================
  # Runner (experimentos e geração de figuras)
  # ============================
  runner:
    image: fl-app-image:latest
    container_name: fl_runner
    volumes:
      - ../src:/app
      - ../paper:/paper
    environment:
      - FIGURES_DIR=/paper/figures
      - TABLES_DIR=/paper/tables
      - SERVER_URL=http://fl-server:5000
      - DATASET=${DATASET:-mnist}
      - TRAINING_PROFILE=${TRAINING_PROFILE:-standard}
    networks:
      - fl-network
    profiles:
      - tools

networks:
  fl-network:
    driver: bridge
