services:
  # ── Front-end ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: semantic_frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5180:80"
    environment:
      - VITE_API_BASE_URL=/api
    networks:
      - semantic_net
    restart: unless-stopped

  # ── Back-end (API Gateway) ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: semantic_backend
    depends_on:
      ml-service:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ML_SERVICE_URL=http://ml-service:8000
      - FL_SERVER_URL=http://fl-server:8100
      - RESULTADOS_DIR=/resultados
    volumes:
      - ./volumes/resultados:/resultados
    ports:
      - "3000:3000"
    networks:
      - semantic_net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 8
    restart: unless-stopped

  # ── ML Inference Service ──────────────────────────────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: semantic_ml_service
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000
      - DATA_ROOT=/ml-data
      - DATASETS_DIR=/ml-data/datasets
      - RUNS_DIR=/ml-data/runs
      - LOGS_DIR=/ml-data/logs
      - RESULTADOS_ROOT=/resultados
      - FL_SERVER_URL=http://fl-server:8100
      - FL_WEIGHTS_DIR=/fl-weights
    volumes:
      - ./volumes/ml_data:/ml-data
      - ./volumes/resultados:/resultados
      - ./volumes/fl_weights:/fl-weights
    expose:
      - "8000"
    networks:
      - semantic_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Federated Learning Server ─────────────────────────────────────────────────
  fl-server:
    build:
      context: .                      # project root — needed to COPY from ml-service/
      dockerfile: fl-server/Dockerfile
    container_name: fl_server
    environment:
      - PYTHONUNBUFFERED=1
      - FL_WEIGHTS_DIR=/fl-weights
      - ML_DATA_DIR=/ml-data
    volumes:
      - ./volumes/ml_data:/ml-data
      - ./volumes/fl_weights:/fl-weights
    expose:
      - "8100"
    networks:
      - semantic_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8100/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Federated Learning Client 1 ───────────────────────────────────────────────
  fl-client-1:
    build:
      context: .
      dockerfile: fl-client/Dockerfile
    container_name: fl_client_1
    environment:
      - PYTHONUNBUFFERED=1
      - CLIENT_ID=1
      - N_CLIENTS=3
      - FL_SERVER_URL=http://fl-server:8100
      - FL_WEIGHTS_DIR=/fl-weights
      - ML_DATA_DIR=/ml-data
    volumes:
      - ./volumes/ml_data:/ml-data
      - ./volumes/fl_weights:/fl-weights
    expose:
      - "8200"
    networks:
      - semantic_net
    depends_on:
      fl-server:
        condition: service_healthy
    restart: unless-stopped

  # ── Federated Learning Client 2 ───────────────────────────────────────────────
  fl-client-2:
    build:
      context: .
      dockerfile: fl-client/Dockerfile
    container_name: fl_client_2
    environment:
      - PYTHONUNBUFFERED=1
      - CLIENT_ID=2
      - N_CLIENTS=3
      - FL_SERVER_URL=http://fl-server:8100
      - FL_WEIGHTS_DIR=/fl-weights
      - ML_DATA_DIR=/ml-data
    volumes:
      - ./volumes/ml_data:/ml-data
      - ./volumes/fl_weights:/fl-weights
    expose:
      - "8200"
    networks:
      - semantic_net
    depends_on:
      fl-server:
        condition: service_healthy
    restart: unless-stopped

  # ── Federated Learning Client 3 ───────────────────────────────────────────────
  fl-client-3:
    build:
      context: .
      dockerfile: fl-client/Dockerfile
    container_name: fl_client_3
    environment:
      - PYTHONUNBUFFERED=1
      - CLIENT_ID=3
      - N_CLIENTS=3
      - FL_SERVER_URL=http://fl-server:8100
      - FL_WEIGHTS_DIR=/fl-weights
      - ML_DATA_DIR=/ml-data
    volumes:
      - ./volumes/ml_data:/ml-data
      - ./volumes/fl_weights:/fl-weights
      - ./volumes/ml_data:/ml-data
    expose:
      - "8200"
    networks:
      - semantic_net
    depends_on:
      fl-server:
        condition: service_healthy
    restart: unless-stopped

networks:
  semantic_net:
    driver: bridge
