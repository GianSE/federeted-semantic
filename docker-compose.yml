services:
  # FL + semantic stack only (no frontend/backend)
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: semantic_ml_service
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000
      - DATA_ROOT=/app/data/ml-data
      - DATASETS_DIR=/app/data/ml-data/datasets
      - RUNS_DIR=/app/data/ml-data/runs
      - LOGS_DIR=/app/data/ml-data/logs
      - RESULTADOS_ROOT=/app/data/resultados
      - FL_WEIGHTS_DIR=/app/data/fl-weights
      - FL_SERVER_URL=http://fl-server:8100
    volumes:
      - ./shared_data:/app/data
    expose:
      - "8000"
    networks:
      - semantic_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  fl-server:
    build:
      context: .
      dockerfile: fl-server/Dockerfile
    container_name: fl_server
    environment:
      - PYTHONUNBUFFERED=1
      - FL_WEIGHTS_DIR=/app/data/fl-weights
      - ML_DATA_DIR=/app/data/ml-data
    volumes:
      - ./shared_data:/app/data
    ports:
      - "8100:8100"
    networks:
      - semantic_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8100/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  fl-client-1:
    build:
      context: .
      dockerfile: fl-client/Dockerfile
    container_name: fl_client_1
    environment:
      - PYTHONUNBUFFERED=1
      - CLIENT_ID=1
      - N_CLIENTS=3
      - FL_SERVER_URL=http://fl-server:8100
      - FL_WEIGHTS_DIR=/app/data/fl-weights
      - ML_DATA_DIR=/app/data/ml-data
    volumes:
      - ./shared_data:/app/data
    expose:
      - "8200"
    networks:
      - semantic_net
    depends_on:
      fl-server:
        condition: service_healthy
    restart: unless-stopped

  fl-client-2:
    build:
      context: .
      dockerfile: fl-client/Dockerfile
    container_name: fl_client_2
    environment:
      - PYTHONUNBUFFERED=1
      - CLIENT_ID=2
      - N_CLIENTS=3
      - FL_SERVER_URL=http://fl-server:8100
      - FL_WEIGHTS_DIR=/app/data/fl-weights
      - ML_DATA_DIR=/app/data/ml-data
    volumes:
      - ./shared_data:/app/data
    expose:
      - "8200"
    networks:
      - semantic_net
    depends_on:
      fl-server:
        condition: service_healthy
    restart: unless-stopped

  fl-client-3:
    build:
      context: .
      dockerfile: fl-client/Dockerfile
    container_name: fl_client_3
    environment:
      - PYTHONUNBUFFERED=1
      - CLIENT_ID=3
      - N_CLIENTS=3
      - FL_SERVER_URL=http://fl-server:8100
      - FL_WEIGHTS_DIR=/app/data/fl-weights
      - ML_DATA_DIR=/app/data/ml-data
    volumes:
      - ./shared_data:/app/data
    expose:
      - "8200"
    networks:
      - semantic_net
    depends_on:
      fl-server:
        condition: service_healthy
    restart: unless-stopped

networks:
  semantic_net:
    driver: bridge
